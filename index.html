<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Weather</h1>
        <div class="search">
            <input type="text" id="city" placeholder="City name" autofocus>
            <button id="search">Get Weather</button>
            <button id="locate" class="locate-btn" title="Use my location">📍</button>
        </div>
        <div class="date-picker">
            <input type="date" id="date" />
        </div>
        <div id="weather" class="weather"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
